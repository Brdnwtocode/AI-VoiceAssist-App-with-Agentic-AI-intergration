version: '3.8'

services:
  voice-ai:
    build: .
    container_name: voice-ai-service
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Optional: mount log directory if there is any log writing to file, otherwise stdout is captured by docker logs.
      - voice_ai_logs:/app/logs

volumes:
  voice_ai_logs:

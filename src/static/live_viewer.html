function renderLLMSummary(trace) {
    if (!trace || !trace.stages || trace.stages.length === 0) return '';
    const stages = trace.stages;

    // Collect stages that have LLM metadata
    const llmStages = stages.filter(s => s.data && (s.data.model || s.data.provider || s.data.total_tokens !== undefined));
    if (llmStages.length === 0) return '';

    // Compute aggregate
    let totalPrompt = 0, totalCompletion = 0, totalTokens = 0;
    const modelsUsed = new Set();
    const providersUsed = new Set();
    llmStages.forEach(s => {
        if (s.data.prompt_tokens) totalPrompt += s.data.prompt_tokens;
        if (s.data.completion_tokens) totalCompletion += s.data.completion_tokens;
        if (s.data.total_tokens) totalTokens += s.data.total_tokens;
        if (s.data.model) modelsUsed.add(s.data.model);
        if (s.data.provider) providersUsed.add(s.data.provider);
    });

    let html = '<div class="llm-body">';

    // Per-stage rows
    llmStages.forEach(s => {
        const d = s.data;
        html += '<div class="llm-row">';
        html += '<span class="llm-stage">'+esc(s.name)+'</span>';
        html += '<span class="llm-model">'+esc(d.model||'?')+'</span>';
        html += '<span class="llm-provider">'+esc(d.provider||'?')+'</span>';
        html += '<span class="llm-tokens">';
        if (d.prompt_tokens || d.completion_tokens) {
            html += '<span class="in">'+d.prompt_tokens+'</span> + <span class="out">'+d.completion_tokens+'</span> = ';
        }
        html += '<span class="total">'+(d.total_tokens||0)+'</span> tok';
        html += '</span>';
        html += '</div>';
    });

    // Totals row
    html += '<div class="llm-totals">';
    html += '<div class="total-item"><span class="total-label">Models:</span><span class="total-value">'+[...modelsUsed].join(', ')+'</span></div>';
    html += '<div class="total-item"><span class="total-label">Providers:</span><span class="total-value">'+[...providersUsed].join(', ')+'</span></div>';
    html += '<div class="total-item"><span class="total-label">Total LLM calls:</span><span class="total-value">'+llmStages.length+'</span></div>';
    html += '<div class="total-item"><span class="total-label">Prompt tokens:</span><span class="total-value">'+totalPrompt.toLocaleString()+'</span></div>';
    html += '<div class="total-item"><span class="total-label">Completion tokens:</span><span class="total-value">'+totalCompletion.toLocaleString()+'</span></div>';
    html += '<div class="total-item"><span class="total-label">Total tokens:</span><span class="total-value">'+totalTokens.toLocaleString()+'</span></div>';
    html += '</div>';
    html += '</div>';

    return '<div class="llm-summary">'+
        '<div class="llm-header" onclick="toggleLLMSection(this)">'+
        '<span class="arrow">&#9654;</span>'+
        '<span>🤖 LLM Usage ('+llmStages.length+' calls, '+totalTokens.toLocaleString()+' tokens)</span>'+
        '<span style="margin-left:auto;font-size:.7rem;color:#8b949e">'+[...providersUsed].join(', ')+'</span>'+
        '</div>'+html+'</div>';
}

function toggleLLMSection(h) {
    const b = h.nextElementSibling;
    const a = h.querySelector('.arrow');
    if(b){b.classList.toggle('collapsed'); if(a)a.classList.toggle('open');}
}

function closeExpertModal() {
    const overlay = document.querySelector('.expert-modal-overlay');
    if (overlay) overlay.remove();
}

// ── Expert Deep-Dive Modal ──
function showExpertModal(stageId) {
    const stages = getCurrentTraceStages();
    if (!stages) return;

    // Find matching stage(s) — handle resolver refinements (resolver, resolver_r1, etc.)
    const matching = stages.filter(s => s.name === stageId || s.name.startsWith(stageId));
    if (matching.length === 0) return;

    // Remove existing modal
    const existing = document.querySelector('.expert-modal-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'expert-modal-overlay';
    overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.remove();
    });

    let modalHTML = '<div class="expert-modal">';
    modalHTML += '<div class="modal-header">';
    modalHTML += '<span style="font-size:1.5rem">'+getExpertIcon(stageId)+'</span>';
    modalHTML += '<h2>'+getExpertTitle(stageId)+'</h2>';
    modalHTML += '<button class="modal-close" onclick="closeExpertModal()">✕</button>';
    modalHTML += '</div>';
    modalHTML += '<div class="modal-body">';

    // Render each matching stage (for refinements, show all iterations)
    matching.forEach((stage, idx) => {
        if (matching.length > 1) {
            modalHTML += '<div class="modal-section-title" style="margin-top:8px">Iteration '+(idx+1)+'</div>';
        }
        modalHTML += buildExpertModalContent(stage);
    });

    modalHTML += '</div></div>';
    overlay.innerHTML = modalHTML;
    document.body.appendChild(overlay);
}

function getExpertIcon(stageId) {
    const icons = {
        'safety_gate': '🛡️', 'complexity_router': '🔀', 'planner': '📋',
        'contrarian_expert': '⚔️', 'research_expert': '🔍', 'conversation_expert': '💬',
        'synthesizer': '🔗', 'resolver': '🎯', 'reflection': '🪞',
        'stt': '🎙️', 'summarize_expert': '📝', 'note_expert': '📄',
        'task_expert': '✅', 'stack_expert': '📊', 'calendar_expert': '📅', 'assemble': '📦'
    };
    // Handle resolver_r1, resolver_r2 etc.
    if (stageId.startsWith('resolver')) return '🎯';
    return icons[stageId] || '🔹';
}

function getExpertTitle(stageId) {
    const titles = {
        'safety_gate': 'Safety Gate', 'complexity_router': 'Complexity Router', 'planner': 'Planner',
        'contrarian_expert': 'Contrarian Expert', 'research_expert': 'Research Expert',
        'conversation_expert': 'Conversation Expert', 'synthesizer': 'Synthesizer',
        'resolver': 'Resolver (NLU)', 'reflection': 'Reflection',
        'stt': 'Speech-to-Text', 'summarize_expert': 'Summary Expert',
        'note_expert': 'Note Expert', 'task_expert': 'Task Expert',
        'stack_expert': 'Stack Expert', 'calendar_expert': 'Calendar Expert', 'assemble': 'Assembly'
    };
    if (stageId.startsWith('resolver')) return 'Resolver (NLU) — Iteration '+(stageId.replace('resolver_r','')||'1');
    return titles[stageId] || stageId;
}

function buildExpertModalContent(stage) {
    const data = stage.data || {};
    const name = stage.name;
    let html = '';

    // ── Status & duration ──
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title">📊 Status</div>';
    html += '<div class="modal-section-content">';
    html += 'Status: <b style="color:'+(stage.status==='passed'?'#7ee787':stage.status==='failed'?'#f87171':'#8b949e')+'">'+esc(stage.status||'?')+'</b> | ';
    html += 'Duration: <b>'+stage.duration_ms+'ms</b>';
    if (data.model) html += ' | Model: <b style="color:#d2a8ff">'+esc(data.model)+'</b>';
    if (data.provider) html += ' | Provider: <b style="color:#a5d6ff">'+esc(data.provider)+'</b>';
    if (data.total_tokens) html += ' | Tokens: <b style="color:#ffa657">'+(data.prompt_tokens||0)+' in + '+(data.completion_tokens||0)+' out = '+data.total_tokens+' total</b>';
    html += '</div></div>';

    // ── Tool usage ──
    const tools = getToolsForStage(name, data);
    if (tools.length > 0) {
        html += '<div class="modal-section">';
        html += '<div class="modal-section-title">🔧 Tools Used</div>';
        html += '<div class="modal-section-content">';
        tools.forEach(t => {
            html += '<span class="tool-badge '+t.cls+'">'+esc(t.name)+'</span> ';
        });
        html += '</div></div>';
    }

    // ── Stage-specific data ──
    if (name === 'safety_gate') {
        if (data.reason) {
            html += '<div class="modal-section"><div class="modal-section-title">🛡️ Verdict</div><div class="modal-section-content">'+esc(data.reason)+'</div></div>';
        }
    } else if (name === 'complexity_router') {
        if (data.reasoning) {
            html += '<div class="modal-section"><div class="modal-section-title">🔀 Routing Reasoning</div><div class="modal-section-content">'+esc(data.reasoning)+'</div></div>';
        }
    } else if (name === 'contrarian_expert') {
        if (data.critique && data.critique !== 'Contrarian unavailable') {
            html += '<div class="modal-section"><div class="modal-section-title">⚔️ Critique (risk: '+esc(data.risk||'?')+')</div><div class="modal-section-content">'+esc(data.critique)+'</div></div>';
        }
        if (data.plan_aware) {
            html += '<div class="modal-section"><div class="modal-section-title">📋 Plan-Aware</div><div class="modal-section-content">Critique was based on the execution plan from the Planner node.</div></div>';
        }
        if (data.error) {
            html += '<div class="modal-section"><div class="modal-section-title" style="color:#f87171">⚠️ Error</div><div class="modal-section-content code" style="color:#f87171">'+esc(data.error)+'</div></div>';
        }
    } else if (name === 'research_expert') {
        if (data.data_gaps && data.data_gaps.length > 0) {
            let gapHTML = '<ul class="gap-list">';
            data.data_gaps.forEach(g => { gapHTML += '<li>⚠ '+esc(g)+'</li>'; });
            gapHTML += '</ul>';
            html += '<div class="modal-section"><div class="modal-section-title">🔍 Data Gaps ('+data.data_gaps.length+')</div><div class="modal-section-content">'+gapHTML+'</div></div>';
        }
        html += '<div class="modal-section"><div class="modal-section-title">📊 Research Metrics</div><div class="modal-section-content">';
        html += 'Confidence: <b>'+Math.round((data.confidence||0)*100)+'%</b><br>';
        html += 'Web search: <b>'+(data.web_search?'Yes ('+data.web_results+' results)':'No')+'</b><br>';
        html += 'Findings length: <b>'+(data.findings_len||0)+' chars</b>';
        html += '</div></div>';
    } else if (name === 'conversation_expert') {
        if (data.intent) {
            html += '<div class="modal-section"><div class="modal-section-title">💬 Extracted Intent</div><div class="modal-section-content">'+esc(data.intent)+'</div></div>';
        }
        html += '<div class="modal-section"><div class="modal-section-title">🗣️ Language & Tone</div><div class="modal-section-content">';
        html += 'Language: <b>'+esc(data.language||'?')+'</b> | Tone: <b>'+esc(data.tone||'?')+'</b> | Ambiguity: <b>'+(data.has_ambiguity?'Yes ⚠️':'No')+'</b>';
        html += '</div></div>';
    } else if (name === 'synthesizer') {
        html += '<div class="modal-section"><div class="modal-section-title">🔗 Expert Fusion</div><div class="modal-section-content">';
        html += 'Combined <b>'+data.experts_combined+'</b> expert outputs'+(data.has_plan?' + execution plan':'')+' into a resolver directive.<br>';
        html += 'Directive length: <b>'+data.directive_len+' chars</b>';
        html += '</div></div>';
    } else if (name && name.startsWith('resolver')) {
        if (data.error) {
            html += '<div class="modal-section"><div class="modal-section-title" style="color:#f87171">⚠️ Validation Error</div><div class="modal-section-content code" style="color:#f87171">'+esc(data.error)+'</div></div>';
        }
        html += '<div class="modal-section"><div class="modal-section-title">🎯 Resolver Output</div><div class="modal-section-content">';
        html += 'Action: <b style="color:#7ee787">'+esc(data.action||'?')+'</b><br>';
        if (data.has_reply) html += 'Has conversational reply: <b>Yes</b><br>';
        if (data.refinement !== undefined) html += 'Refinement iteration: <b>#'+data.refinement+'</b>';
        html += '</div></div>';
    } else if (name === 'reflection') {
        html += '<div class="modal-section"><div class="modal-section-title">🪞 Reflection Verdict</div><div class="modal-section-content">';
        html += 'Score: <b style="color:'+(data.score>0.7?'#7ee787':'#ffa657')+'">'+Math.round((data.score||0)*100)+'%</b><br>';
        html += 'Needs refinement: <b>'+(data.needs_refinement?'Yes ⚠️':'No ✅')+'</b><br>';
        if (data.issues_count) html += 'Issues found: <b style="color:#f87171">'+data.issues_count+'</b><br>';
        if (data.accepted) html += 'Final decision: <b style="color:#7ee787">Accepted</b> — '+esc(data.reason||'')+'<br>';
        html += '</div></div>';
    }

    // ── Raw data (collapsible) ──
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title toggle-raw-data" style="cursor:pointer">📋 Raw Stage Data (click to toggle)</div>';
    html += '<div class="modal-section-content code raw-data-hidden" style="display:none">'+esc(JSON.stringify(data, null, 2))+'</div>';
    html += '</div>';

    return html;
}

function getToolsForStage(name, data) {
    const tools = [];
    if (name === 'safety_gate') {
        tools.push({name:'LLM Safety Screening', cls:'used'});
    } else if (name === 'complexity_router') {
        tools.push({name:'Rule-based Router', cls:'used'});
    } else if (name === 'planner') {
        tools.push({name:'LLM Planning', cls:'used'});
        tools.push({name:'Step Decomposition', cls:'used'});
    } else if (name === 'contrarian_expert') {
        tools.push({name:'Edge Case Generator', cls:'used'});
        tools.push({name:'Sycophancy Detector', cls:'used'});
        tools.push({name:'Risk Matrix', cls:'used'});
        if (data.plan_aware) tools.push({name:'Plan-aware Critique', cls:'used'});
        if (!data.critique || data.critique === 'Contrarian unavailable') {
            tools.push({name:'LLM call FAILED', cls:'error'});
        } else {
            tools.push({name:'LLM Critique', cls:'used'});
        }
    } else if (name === 'research_expert') {
        tools.push({name:'Workspace Fact Extraction', cls:'used'});
        if (data.web_search) tools.push({name:'Web Search (DuckDuckGo)', cls:'used'});
        else tools.push({name:'Web Search', cls:'skipped'});
        tools.push({name:'LLM Grounding', cls:'used'});
    } else if (name === 'conversation_expert') {
        tools.push({name:'Language Detector', cls:'used'});
        tools.push({name:'Tone Classifier', cls:'used'});
        tools.push({name:'Ambiguity Scanner', cls:'used'});
        if (data.plan_aware) tools.push({name:'Plan-Intent Alignment', cls:'used'});
        tools.push({name:'LLM Intent Extraction', cls:'used'});
    } else if (name === 'synthesizer') {
        tools.push({name:'Expert Fusion Engine', cls:'used'});
        tools.push({name:'Directive Generator', cls:'used'});
    } else if (name && name.startsWith('resolver')) {
        tools.push({name:'LLM NLU Resolution', cls:'used'});
        if (data.action === 'summarize_context') tools.push({name:'Context Summarization', cls:'used'});
        if (data.refinement) tools.push({name:'Refinement Loop', cls:'warning'});
    } else if (name === 'reflection') {
        tools.push({name:'LLM Self-Critique', cls:'used'});
        tools.push({name:'Quality Gate', cls:'used'});
        if (data.needs_refinement) tools.push({name:'Retry Trigger', cls:'warning'});
    }
    return tools;
}

function renderDetail(entry) {
    const panel = document.getElementById('detailPanel');
    const req = entry.request || {};
    const resp = entry.response || {};
    const formFields = req.form_fields || {};
    const audioInfo = req.audio_info;
    const respBody = resp.body || {};
    const mode = entry.mode || '';

    // Look up pipeline trace
    let trace = entry.pipeline_trace;
    const s = getActiveSession();
    if (!trace && s) trace = s.pipelineTraces[entry.id];

    const isError = respBody && typeof respBody === 'object' && respBody.error;
    const isRecords = mode === 'automate';
    let sections = '';

    // Store trace stages for expert modal access
    setCurrentTraceStages(trace ? trace.stages : null);

    // ── Pipeline Visualization (always on top) ──
    sections += renderPipelineViz(trace, mode);

    // ── Data Flow Trace (new!) ──
    if (trace && trace.stages && trace.stages.length > 0) {
        sections += renderDataFlow(trace, mode, respBody);
    }

    // ── LLM Usage Summary (model, tokens, provider) ──
    sections += renderLLMSummary(trace);

    // ── Pipeline Stage Details ──
    if (trace && trace.stages && trace.stages.length > 0) {
        sections += buildSection('pipeline-stages', '📊 Pipeline Stage Details — Expert Thoughts, Tools & Results ('+trace.stages.length+' stages)', 'stage', 'stages',
            '<div style="padding:0">'+renderStageDetails(trace.stages)+'</div>', true);
    }

    // ── Request: Metadata ──
    const metaRows = [
        ['method', req.method || 'POST'],
        ['path', req.path || '/api/v1/voice/process'],
        ['client', req.client || '(unknown)'],
    ];
    sections += buildSection('req-meta', '📤 Request: Metadata', 'json', 'POST',
        '<div class="data-grid">'+metaRows.map(([k,v]) => '<div class="row"><div class="key">'+k+'</div><span class="value str">'+esc(v)+'</span></div>').join('')+'</div>');

    // ── Request: Form Fields (sent data package) ──
    if (Object.keys(formFields).length > 0) {
        const displayFields = {};
        for (const [k, v] of Object.entries(formFields)) {
            if (v && v !== 'None' && v !== 'null') displayFields[k] = v;
        }
        if (Object.keys(displayFields).length > 0) {
            sections += buildSection('req-form', '📤 Request: Sent Data Package ('+Object.keys(displayFields).length+' fields)', 'form', 'form-data',
                '<div class="data-grid">'+kvRows(displayFields)+'</div>');
        }
    }

    // ── Audio Info ──
    if (audioInfo && typeof audioInfo === 'object' && Object.keys(audioInfo).length > 0) {
        sections += buildSection('req-audio', '🎙️ Request: Audio File', 'form', 'audio',
            '<div class="data-grid">'+kvRows(audioInfo)+'</div>');
    }

    // ── Response: Body ──
    const respCT = resp.content_type || 'application/json';
    const respFmt = isError ? 'error' : 'json';
    sections += buildSection('resp-body', '📥 Response: Received Data Package', respFmt, respCT,
        '<div class="code-block'+(isError?' style="color:#f87171"':'')+'">'+hlJSON(respBody)+'</div>', true);

    // ── Records-specific breakdown ──
    if (isRecords && !isError) {
        // Summary
        if (respBody.summary) {
            sections += buildSection('rec-summary', '📝 Summary', 'json', 'text',
                '<div class="code-block" style="white-space:pre-wrap;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;font-size:.9rem;line-height:1.6">'+esc(respBody.summary)+'</div>', true);
        }

        // Note Mutation
        if (respBody.note_mutation) {
            const nm = respBody.note_mutation;
            const noteRows = [
                ['title', nm.title || ''],
                ['content', (nm.content || '').substring(0, 500) + ((nm.content||'').length > 500 ? '…' : '')],
                ['folder_id', nm.folder_id || 'null (new note)'],
            ];
            sections += buildSection('rec-note', '📄 Note Mutation', 'json', 'note',
                '<div class="data-grid">'+noteRows.map(([k,v]) => '<div class="row"><div class="key">'+k+'</div><span class="value str">'+esc(v)+'</span></div>').join('')+'</div>', false);
        } else {
            sections += buildSection('rec-note', '📄 Note Mutation', 'stage', 'empty',
                '<div style="padding:12px;color:#484f58;font-size:.8rem">No note extracted from this recording.</div>', false);
        }

        // Task Mutations
        const tasks = respBody.task_mutations || [];
        if (tasks.length > 0) {
            let taskHTML = '<div style="padding:0">';
            tasks.forEach((t, i) => {
                taskHTML += '<div class="stage-detail-item" style="flex-direction:column;align-items:flex-start;gap:4px">';
                taskHTML += '<strong style="color:#e1e4e8">#'+(i+1)+' '+esc(t.title)+'</strong>';
                if (t.description) taskHTML += '<span style="color:#8b949e;font-size:.75rem">'+esc(t.description.substring(0,200))+'</span>';
                taskHTML += '<span style="font-size:.7rem;color:#484f58">status: '+esc(t.status||'TODO')+' | priority: '+esc(t.priority||'MEDIUM')+' | assignee: '+esc(t.assignee||'—')+' | due: '+esc(t.due_date||'—')+'</span>';
                taskHTML += '</div>';
            });
            taskHTML += '</div>';
            sections += buildSection('rec-tasks', '✅ Task Mutations ('+tasks.length+' tasks)', 'json', 'tasks', taskHTML, true);
        } else {
            sections += buildSection('rec-tasks', '✅ Task Mutations', 'stage', 'empty',
                '<div style="padding:12px;color:#484f58;font-size:.8rem">No tasks extracted.</div>', false);
        }

        // Stack Mutation
        if (respBody.stack_mutation) {
            const sm = respBody.stack_mutation;
            const cols = (sm.columns || []).map(c => c.name+' ('+c.type+')').join(', ');
            let stackHTML = '<div class="data-grid">';
            stackHTML += '<div class="row"><div class="key">stack_name</div><span class="value str">'+esc(sm.stack_name||'')+'</span></div>';
            stackHTML += '<div class="row"><div class="key">columns</div><span class="value str">'+esc(cols||'none')+'</span></div>';
            stackHTML += '<div class="row"><div class="key">rows</div><span class="value num">'+(sm.rows||[]).length+' rows</span></div>';
            stackHTML += '</div>';
            sections += buildSection('rec-stack', '📊 Stack Mutation', 'json', 'stack', stackHTML, false);
        } else {
            sections += buildSection('rec-stack', '📊 Stack Mutation', 'stage', 'empty',
                '<div style="padding:12px;color:#484f58;font-size:.8rem">No table/stack data extracted.</div>', false);
        }

        // Calendar Mutation
        if (respBody.calendar_mutation) {
            const cm = respBody.calendar_mutation;
            const calRows = [
                ['title', cm.title || ''],
                ['start_at', cm.start_at || ''],
                ['end_at', cm.end_at || ''],
                ['all_day', String(cm.all_day || false)],
                ['notes', cm.notes || '—'],
            ];
            sections += buildSection('rec-calendar', '📅 Calendar Mutation', 'json', 'event',
                '<div class="data-grid">'+calRows.map(([k,v]) => '<div class="row"><div class="key">'+k+'</div><span class="value str">'+esc(v)+'</span></div>').join('')+'</div>', false);
        } else {
            sections += buildSection('rec-calendar', '📅 Calendar Mutation', 'stage', 'empty',
                '<div style="padding:12px;color:#484f58;font-size:.8rem">No calendar event extracted.</div>', false);
        }

        // Speaker Labels
        const speakers = respBody.speaker_labels;
        if (speakers && speakers.length > 0) {
            let spHTML = '<div class="data-grid">';
            spHTML += '<div class="row"><div class="key">speaker_count</div><span class="value num">'+speakers.length+'</span></div>';
            speakers.forEach(sp => {
                spHTML += '<div class="row"><div class="key">'+esc(sp.speaker)+'</div><span class="value str">'+(sp.segments||[]).length+' segments</span></div>';
            });
            spHTML += '</div>';
            sections += buildSection('rec-speakers', '🎤 Speaker Labels', 'json', 'speakers', spHTML, false);
        }
    }

    // ── Response: Metadata ──
    const rMeta = [
        ['status_code', String(entry.status_code)],
        ['action', entry.action || respBody.action || '—'],
        ['mode', mode || 'voice-command'],
        ['duration', String(entry.duration_ms)+'ms'],
        ['timestamp', entry.timestamp || ''],
    ];
    sections += buildSection('resp-meta', '📥 Response: Metadata', 'json', String(entry.status_code),
        '<div class="data-grid">'+rMeta.map(([k,v]) => '<div class="row"><div class="key">'+k+'</div><span class="value str">'+esc(v)+'</span></div>').join('')+'</div>', true);

    panel.innerHTML = sections;
}

loadExisting();
connectSSE();
connectPipelineSSE();
addJSONExportButton();

// Delegated click: toggle raw data in expert modal
document.addEventListener('click', function(e) {
    const toggle = e.target.closest('.toggle-raw-data');
    if (toggle) {
        const content = toggle.nextElementSibling;
        if (content) {
            const isHidden = content.style.display === 'none';
            content.style.display = isHidden ? 'block' : 'none';
        }
    }
});

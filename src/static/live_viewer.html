<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100vh;
}
.header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
}
.header h1 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #58a6ff;
    display: flex;
    align-items: center;
    gap: 8px;
}
.header h1::before {
    content: "";
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #3fb950;
    animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.connection-status {
    font-size: .75rem; padding: 3px 10px; border-radius: 12px;
    background: #21262d; color: #8b949e;
}
.connection-status.connected { color: #3fb950; }
.connection-status.disconnected { color: #f85149; }
.stats {
    display: flex; gap: 16px; margin-left: auto;
    font-size: .8rem; color: #8b949e;
}
.stats span { white-space: nowrap; }
.stats strong { color: #e1e4e8; }
.toolbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 8px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
}
.toolbar input {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 6px 12px; color: #e1e4e8; font-size: .85rem;
    flex: 1; max-width: 400px; outline: none;
}
.toolbar input:focus { border-color: #58a6ff; }
.toolbar label {
    font-size: .8rem; color: #8b949e;
    display: flex; align-items: center; gap: 4px; cursor: pointer;
}
.toolbar button {
    background: #21262d; border: 1px solid #30363d; border-radius: 6px;
    padding: 5px 14px; color: #e1e4e8; font-size: .8rem; cursor: pointer;
}
.toolbar button:hover { background: #30363d; }
.main { display: flex; flex: 1; overflow: hidden; }
.entry-list {
    width: 420px; min-width: 320px;
    border-right: 1px solid #30363d; overflow-y: auto;
    background: #0d1117; flex-shrink: 0;
}
.entry-list::-webkit-scrollbar { width: 6px; }
.entry-list::-webkit-scrollbar-track { background: #0d1117; }
.entry-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
.entry-item {
    padding: 10px 16px; border-bottom: 1px solid #21262d;
    cursor: pointer; transition: background .15s;
    display: flex; flex-direction: column; gap: 4px;
}
.entry-item:hover { background: #161b22; }
.entry-item.active { background: #1c2333; border-left: 3px solid #58a6ff; }
.entry-item .top-row {
    display: flex; align-items: center; gap: 8px; font-size: .8rem;
}
.entry-item .top-row .time {
    color: #8b949e; font-family: 'Courier New',monospace;
    font-size: .75rem; flex-shrink: 0;
}
.entry-item .top-row .method { font-weight: 600; color: #79c0ff; }
.entry-item .top-row .status { padding: 1px 6px; border-radius: 3px; font-size: .7rem; font-weight: 600; }
.entry-item .top-row .status.ok { background: #1b3d1f; color: #7ee787; }
.entry-item .top-row .status.err { background: #3d1f1f; color: #f87171; }
.entry-item .top-row .status.redirect { background: #1f2d3d; color: #79c0ff; }
.entry-item .top-row .duration {
    color: #8b949e; font-family: 'Courier New',monospace;
    font-size: .75rem; margin-left: auto; flex-shrink: 0;
}
.entry-item .summary-text {
    font-size: .82rem; color: #c9d1d9;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
}
.entry-item .summary-text .ctx { color: #d2a8ff; }
.entry-item .summary-text .transcript { color: #a5d6ff; }
.entry-item .summary-text .audio-tag { color: #7ee787; }
.empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 200px; color: #484f58; font-size: .9rem; gap: 8px;
}
.empty-state .icon { font-size: 2rem; }
.detail-panel { flex: 1; overflow-y: auto; background: #0d1117; padding: 20px; }
.detail-panel::-webkit-scrollbar { width: 6px; }
.detail-panel::-webkit-scrollbar-track { background: #0d1117; }
.detail-panel::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
.detail-empty {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: #484f58; font-size: .95rem;
}
.detail-section {
    margin-bottom: 24px; border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
}
.detail-section .section-header {
    background: #161b22; padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
    border-bottom: 1px solid #30363d;
}
.detail-section .section-header:hover { background: #1c2333; }
.detail-section .section-header h3 { font-size: .85rem; font-weight: 600; color: #e1e4e8; flex: 1; }
.detail-section .section-header .arrow { color: #8b949e; transition: transform .2s; font-size: .75rem; }
.detail-section .section-header .arrow.open { transform: rotate(90deg); }
.detail-section .section-header .fmt-badge {
    font-size: .7rem; padding: 2px 8px; border-radius: 4px;
    background: #21262d; color: #8b949e; font-weight: 500;
}
.detail-section .section-header .fmt-badge.json { background: #1b3d1f; color: #7ee787; }
.detail-section .section-header .fmt-badge.audio { background: #3d1f3d; color: #f0a8ff; }
.detail-section .section-header .fmt-badge.text { background: #1f2d3d; color: #79c0ff; }
.detail-section .section-header .fmt-badge.form { background: #2d1f1f; color: #f0a8a8; }
.detail-section .section-header .fmt-badge.error { background: #3d1f1f; color: #f87171; }
.detail-section .section-body { background: #0d1117; }
.detail-section .section-body.collapsed { display: none; }
.data-grid { padding: 12px 16px; font-size: .82rem; }
.data-grid .row { display: flex; padding: 4px 0; border-bottom: 1px solid #1c2128; }
.data-grid .row:last-child { border-bottom: none; }
.data-grid .key {
    min-width: 180px; max-width: 240px; flex-shrink: 0;
    color: #8b949e; font-family: 'Courier New',monospace;
    font-size: .78rem; padding-right: 12px; word-break: break-all;
}
.data-grid .value {
    flex: 1; color: #e1e4e8; word-break: break-all;
    white-space: pre-wrap; font-family: 'Courier New',monospace;
    font-size: .78rem; line-height: 1.4;
}
.data-grid .value.null { color: #484f58; font-style: italic; }
.data-grid .value.str { color: #a5d6ff; }
.data-grid .value.num { color: #79c0ff; }
.data-grid .value.bool { color: #ffa657; }
.code-block {
    padding: 16px; font-family: 'Courier New','Consolas',monospace;
    font-size: .82rem; line-height: 1.5; overflow-x: auto;
    white-space: pre-wrap; word-break: break-word; color: #e1e4e8;
}
.code-block .string { color: #a5d6ff; }
.code-block .number { color: #79c0ff; }
.code-block .boolean { color: #ffa657; }
.code-block .null { color: #8b949e; }
.code-block .key { color: #d2a8ff; }
.code-block .bracket { color: #8b949e; }
.code-block .error-body .string { color: #f87171; }
.code-block .error-body .key { color: #f87171; }
@media (max-width: 800px) {
    .main { flex-direction: column; }
    .entry-list { width: 100%; min-width: 0; max-height: 40vh; border-right: none; border-bottom: 1px solid #30363d; }
    .detail-panel { max-height: 60vh; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Live Viewer</h1>
    <span class="connection-status" id="connStatus">connecting...</span>
    <div class="stats">
        <span>entries: <strong id="entryCount">0</strong></span>
        <span>last: <strong id="lastEntry">—</strong></span>
    </div>
</div>

<div class="toolbar">
    <input type="text" id="filterInput" placeholder="Filter..." oninput="renderList()">
    <label><input type="checkbox" id="autoScroll" checked> Auto-scroll</label>
    <button onclick="clearAll()">Clear</button>
</div>

<div class="main">
    <div class="entry-list" id="entryList"><div class="empty-state"><div class="icon">&#9678;</div><div>Waiting for requests...</div></div></div>
    <div class="detail-panel" id="detailPanel"><div class="detail-empty">Select an entry to inspect</div></div>
</div>

<script>
const entries = [];
let selectedId = null;
let eventSource = null;

function connectSSE() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource(location.origin + '/api/live-viewer/stream');
    const cs = document.getElementById('connStatus');
    eventSource.onopen = () => { cs.textContent='connected'; cs.className='connection-status connected'; };
    eventSource.onmessage = e => {
        try { const entry = JSON.parse(e.data); entries.push(entry); updateStats(); renderList(!!document.getElementById('autoScroll').checked); }
        catch(err) { console.error('SSE parse error:', err); }
    };
    eventSource.onerror = () => { cs.textContent='disconnected'; cs.className='connection-status disconnected'; setTimeout(connectSSE, 3000); };
}

function updateStats() {
    document.getElementById('entryCount').textContent = entries.length;
    if (entries.length > 0) document.getElementById('lastEntry').textContent = entries[entries.length-1].timestamp;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderList(scroll) {
    const container = document.getElementById('entryList');
    const filter = (document.getElementById('filterInput').value || '').toLowerCase();
    const filtered = filter ? entries.filter(e => (e.summary||'').toLowerCase().includes(filter) || String(e.status_code).includes(filter)) : entries;
    if (filtered.length === 0) {
        container.innerHTML = entries.length === 0
            ? '<div class="empty-state"><div class="icon">&#9678;</div><div>Waiting for requests...</div></div>'
            : '<div class="empty-state"><div class="icon">&#9744;</div><div>No entries match filter</div></div>';
        return;
    }
    let html = '';
    for (const entry of filtered) {
        const sc = entry.status_code < 300 ? 'ok' : (entry.status_code < 400 ? 'redirect' : 'err');
        const act = entry.id === selectedId ? ' active' : '';
        const s = entry.summary || '';
        let sh = esc(s).replace(/\[([^\]]+)\]/g,'<span class="ctx">[$1]</span>').replace(/\(audio\)/g,'<span class="audio-tag">(audio)</span>').replace(/"([^"]+)"/g,'<span class="transcript">"$1"</span>');
        html += '<div class="entry-item'+act+'" data-id="'+entry.id+'" onclick="selectEntry(\''+entry.id+'\')">';
        html += '<div class="top-row"><span class="time">'+(entry.timestamp||'')+'</span><span class="method">'+(entry.method||'POST')+'</span><span class="status '+sc+'">'+entry.status_code+'</span><span class="duration">'+entry.duration_ms+'ms</span></div>';
        html += '<div class="summary-text">'+sh+'</div></div>';
    }
    container.innerHTML = html;
    if (scroll) { container.scrollTop = container.scrollHeight; }
    else if (selectedId) { const el = container.querySelector('.active'); if (el) el.scrollIntoView({block:'nearest'}); }
}

function selectEntry(id) {
    selectedId = id;
    renderList(false);
    const entry = entries.find(e => e.id === id);
    if (entry) renderDetail(entry);
}

function fv(v) {
    if (v === null || v === undefined) return '<span class="value null">null</span>';
    if (typeof v === 'boolean') return '<span class="value bool">'+v+'</span>';
    if (typeof v === 'number') return '<span class="value num">'+v+'</span>';
    if (typeof v === 'object') return '<span class="value">'+hlJSON(v)+'</span>';
    const s = String(v);
    if (s.length > 1 && (s[0] === '{' || s[0] === '[')) {
        try { return '<span class="value">'+hlJSON(JSON.parse(s))+'</span>'; } catch(e) {}
    }
    if (s.length > 5000) return '<span class="value str">'+esc(s.substring(0,5000))+'… <em>(truncated, '+s.length+' total)</em></span>';
    return '<span class="value str">'+esc(s)+'</span>';
}

function kvRows(obj) {
    if (!obj || typeof obj !== 'object') return '';
    return Object.entries(obj).map(([k,v]) => '<div class="row"><div class="key">'+esc(k)+'</div>'+fv(v)+'</div>').join('');
}

function hlJSON(obj, indent) {
    indent = indent || '';
    const nl = '\n'+indent;
    if (obj === null || obj === undefined) return '<span class="null">null</span>';
    if (typeof obj === 'string') return '<span class="string">"'+esc(obj)+'"</span>';
    if (typeof obj === 'number') return '<span class="number">'+obj+'</span>';
    if (typeof obj === 'boolean') return '<span class="boolean">'+obj+'</span>';
    if (Array.isArray(obj)) {
        if (obj.length === 0) return '<span class="bracket">[</span><span class="bracket">]</span>';
        return '<span class="bracket">[</span>'+nl+obj.map(i => indent+'  '+hlJSON(i, indent+'  ')).join(','+nl)+nl+'<span class="bracket">]</span>';
    }
    const keys = Object.keys(obj);
    if (keys.length === 0) return '<span class="bracket">{</span><span class="bracket">}</span>';
    return '<span class="bracket">{</span>'+nl+keys.map(k => indent+'  <span class="key">"'+esc(k)+'"</span>: '+hlJSON(obj[k], indent+'  ')).join(','+nl)+nl+indent+'<span class="bracket">}</span>';
}

function fmtCT(ct) {
    if (!ct) return 'text';
    if (ct.includes('json')) return 'json';
    if (ct.includes('audio')) return 'audio';
    if (ct.includes('form-data')||ct.includes('x-www-form-urlencoded')) return 'form';
    return 'text';
}

function buildSection(id, title, fmtClass, fmtLabel, bodyHTML, open) {
    const o = open !== false;
    return '<div class="detail-section" data-section="'+id+'">'+
        '<div class="section-header" onclick="toggleSection(this)">'+
        '<span class="arrow'+(o?' open':'')+'">&#9654;</span>'+
        '<h3>'+title+'</h3>'+
        (fmtClass ? '<span class="fmt-badge '+fmtClass+'">'+esc(fmtLabel)+'</span>' : '')+
        '</div><div class="section-body'+(o?'':' collapsed')+'">'+bodyHTML+'</div></div>';
}

function toggleSection(h) { const b = h.nextElementSibling; const a = h.querySelector('.arrow'); if(b){b.classList.toggle('collapsed'); if(a)a.classList.toggle('open');} }

function renderDetail(entry) {
    const panel = document.getElementById('detailPanel');
    const req = entry.request || {};
    const resp = entry.response || {};
    const headers = req.headers || {};
    const formFields = req.form_fields || {};
    const audioInfo = req.audio_info;
    const respBody = resp.body || {};

    const reqCT = headers['content-type'] || 'unknown';
    const reqFmt = fmtCT(reqCT);
    const isError = respBody && typeof respBody === 'object' && respBody.error;

    let sections = '';

    // -- Request Metadata row (method, path, query_string, client) --
    const metaRows = [
        ['method', req.method || 'POST'],
        ['path', req.path || '/'],
        ['query_string', req.query_string || '(none)'],
        ['client', req.client || '(unknown)'],
    ];
    sections += buildSection('req-meta', 'Request: Metadata', reqFmt, reqCT,
        '<div class="data-grid">'+metaRows.map(([k,v]) => '<div class="row"><div class="key">'+k+'</div><span class="value str">'+esc(v)+'</span></div>').join('')+'</div>');

    // -- Request Headers (all HTTP headers) --
    if (Object.keys(headers).length > 0) {
        sections += buildSection('req-headers', 'Request: HTTP Headers ('+Object.keys(headers).length+')', null, null,
            '<div class="data-grid">'+kvRows(headers)+'</div>');
    }

    // -- Request Form Fields (all parsed form data) --
    if (Object.keys(formFields).length > 0) {
        sections += buildSection('req-form', 'Request: Form Fields ('+Object.keys(formFields).length+')', reqFmt, reqCT,
            '<div class="data-grid">'+kvRows(formFields)+'</div>');
    } else {
        // Show a message explaining why form fields might be empty
        const reason = isError
            ? 'This entry was captured at the error-handler level (status '+entry.status_code+'). The form body was not parsed before the error occurred, so raw form fields are unavailable. The HTTP headers above show what the server received.'
            : 'No form fields were captured for this entry.';
        sections += buildSection('req-form', 'Request: Form Fields', reqFmt, reqCT,
            '<div class="code-block"><span class="null">'+esc(reason)+'</span></div>');
    }

    // -- Audio info (if present) --
    if (audioInfo && typeof audioInfo === 'object' && Object.keys(audioInfo).length > 0) {
        sections += buildSection('req-audio', 'Request: Audio File', 'audio', 'audio',
            '<div class="data-grid">'+kvRows(audioInfo)+'</div>');
    }

    // -- Response --
    const respCT = resp.content_type || 'application/json';
    const respFmt = isError ? 'error' : fmtCT(respCT);
    sections += buildSection('resp-body', 'Response: Body', respFmt, respCT,
        '<div class="code-block'+(isError?' error-body':'')+'">'+hlJSON(respBody)+'</div>',
        true);

    // -- Response metadata section (always shown) --
    const rMeta = [
        ['status_code', String(entry.status_code)],
        ['content_type', respCT],
        ['duration', String(entry.duration_ms)+'ms'],
        ['timestamp', entry.timestamp || ''],
    ];
    sections += buildSection('resp-meta', 'Response: Metadata', respFmt, respCT,
        '<div class="data-grid">'+rMeta.map(([k,v]) => '<div class="row"><div class="key">'+k+'</div><span class="value str">'+esc(v)+'</span></div>').join('')+'</div>',
        true);

    panel.innerHTML = sections;
}

function clearAll() {
    entries.length = 0; selectedId = null;
    document.getElementById('entryList').innerHTML = '<div class="empty-state"><div class="icon">&#9678;</div><div>Waiting for requests...</div></div>';
    document.getElementById('detailPanel').innerHTML = '<div class="detail-empty">Select an entry to inspect</div>';
    updateStats();
}

async function loadExisting() {
    try {
        const resp = await fetch('/api/live-viewer/entries');
        const data = await resp.json();
        for (const summ of data) {
            const dr = await fetch('/api/live-viewer/entries/'+summ.id);
            if (dr.ok) {
                const full = await dr.json();
                if (!entries.find(e => e.id === full.id)) entries.push(full);
            }
        }
        updateStats(); renderList(true);
    } catch(err) { console.error('loadExisting:', err); }
}

loadExisting();
connectSSE();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Viewer — AI Voice Pipeline</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}
.header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
}
.header h1 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #58a6ff;
    display: flex;
    align-items: center;
    gap: 8px;
}
.header h1::before {
    content: "";
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #3fb950;
    animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.connection-status {
    font-size: .75rem; padding: 3px 10px; border-radius: 12px;
    background: #21262d; color: #8b949e;
}
.connection-status.connected { color: #3fb950; }
.connection-status.disconnected { color: #f85149; }
.stats {
    display: flex; gap: 16px; margin-left: auto;
    font-size: .8rem; color: #8b949e;
}
.stats span { white-space: nowrap; }
.stats strong { color: #e1e4e8; }
.toolbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 8px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
}
.toolbar input {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 6px 12px; color: #e1e4e8; font-size: .85rem;
    flex: 1; max-width: 400px; outline: none;
}
.toolbar input:focus { border-color: #58a6ff; }
.toolbar label {
    font-size: .8rem; color: #8b949e;
    display: flex; align-items: center; gap: 4px; cursor: pointer;
}
.toolbar button {
    background: #21262d; border: 1px solid #30363d; border-radius: 6px;
    padding: 5px 14px; color: #e1e4e8; font-size: .8rem; cursor: pointer;
}
.toolbar button:hover { background: #30363d; }
.main { display: flex; flex: 1; overflow: hidden; }
.entry-list {
    width: 380px; min-width: 300px;
    border-right: 1px solid #30363d; overflow-y: auto;
    background: #0d1117; flex-shrink: 0;
}
.entry-list::-webkit-scrollbar { width: 6px; }
.entry-list::-webkit-scrollbar-track { background: #0d1117; }
.entry-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
.entry-item {
    padding: 10px 14px; border-bottom: 1px solid #21262d;
    cursor: pointer; transition: background .15s;
    display: flex; flex-direction: column; gap: 4px;
}
.entry-item:hover { background: #161b22; }
.entry-item.active { background: #1c2333; border-left: 3px solid #58a6ff; padding-left: 11px; }
.entry-item .top-row {
    display: flex; align-items: center; gap: 8px; font-size: .8rem;
}
.entry-item .top-row .time {
    color: #8b949e; font-family: 'Courier New',monospace;
    font-size: .72rem; flex-shrink: 0;
}
.entry-item .top-row .method { font-weight: 600; color: #79c0ff; }
.entry-item .top-row .status { padding: 1px 6px; border-radius: 3px; font-size: .7rem; font-weight: 600; }
.entry-item .top-row .status.ok { background: #1b3d1f; color: #7ee787; }
.entry-item .top-row .status.err { background: #3d1f1f; color: #f87171; }
.entry-item .top-row .action-tag {
    padding: 1px 6px; border-radius: 3px; font-size: .65rem;
    background: #2d1f3d; color: #d2a8ff; font-weight: 600;
    margin-left: auto; flex-shrink: 0;
}
.entry-item .top-row .duration {
    color: #8b949e; font-family: 'Courier New',monospace;
    font-size: .72rem; flex-shrink: 0;
}
.entry-item .summary-text {
    font-size: .8rem; color: #c9d1d9;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
}
.entry-item .pipeline-badge {
    display: inline-block; font-size: .65rem; padding: 1px 6px; border-radius: 3px;
    margin-top: 2px;
}
.entry-item .pipeline-badge.completed { background: #1b3d1f; color: #7ee787; }
.entry-item .pipeline-badge.blocked { background: #3d1f1f; color: #f87171; }
.entry-item .pipeline-badge.error { background: #3d1f1f; color: #f87171; }
.entry-item .pipeline-badge.running { background: #1f2d3d; color: #79c0ff; }
.empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 200px; color: #484f58; font-size: .9rem; gap: 8px;
}
.empty-state .icon { font-size: 2rem; }
.detail-panel { flex: 1; overflow-y: auto; background: #0d1117; padding: 20px; }
.detail-panel::-webkit-scrollbar { width: 6px; }
.detail-panel::-webkit-scrollbar-track { background: #0d1117; }
.detail-panel::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
.detail-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 200px; color: #484f58; font-size: .95rem; gap: 12px;
}

/* ── Pipeline Visualization ── */
.pipeline-viz {
    margin-bottom: 20px;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
    background: #0d1117;
}
.pipeline-viz .viz-header {
    background: #161b22;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #30363d;
    font-weight: 600;
    font-size: .85rem;
    color: #e1e4e8;
}
.pipeline-viz .viz-header .viz-status {
    padding: 2px 8px; border-radius: 10px; font-size: .7rem; font-weight: 600;
}
.pipeline-viz .viz-header .viz-status.completed { background: #1b3d1f; color: #7ee787; }
.pipeline-viz .viz-header .viz-status.blocked { background: #3d1f1f; color: #f87171; }
.pipeline-viz .viz-header .viz-status.error { background: #3d1f1f; color: #f87171; }
.pipeline-viz .viz-header .viz-status.running { background: #1f2d3d; color: #79c0ff; }
.pipeline-stages {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    padding: 12px;
    align-items: flex-start;
}
.pipeline-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
    position: relative;
}
.pipeline-connector {
    display: flex;
    align-items: center;
    padding: 0 2px;
    color: #30363d;
    font-size: 1rem;
    margin-top: 14px;
}
.pipeline-connector.active { color: #58a6ff; }
.stage-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 700;
    border: 2px solid #30363d;
    background: #21262d;
    color: #8b949e;
    transition: all .3s;
}
.stage-dot.passed { background: #1b3d1f; border-color: #3fb950; color: #7ee787; }
.stage-dot.failed { background: #3d1f1f; border-color: #f85149; color: #f87171; }
.stage-dot.skipped { background: #1f2d3d; border-color: #8b949e; color: #8b949e; }
.stage-dot.running { background: #1f2d3d; border-color: #58a6ff; color: #79c0ff; animation: pulse 1.5s infinite; }
.stage-label {
    font-size: .62rem; color: #8b949e;
    margin-top: 4px; text-align: center;
    max-width: 90px; word-break: break-word;
    line-height: 1.2;
}
.stage-label.active { color: #e1e4e8; }

/* ── Parallel expert group ── */
.expert-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    border: 1px dashed #30363d;
    border-radius: 6px;
    padding: 6px;
    background: #0d11171a;
}
.expert-group .group-label {
    font-size: .6rem; color: #8b949e;
    text-align: center; text-transform: uppercase;
    letter-spacing: .5px;
}
.expert-group .expert-row {
    display: flex; gap: 4px; justify-content: center;
}

/* ── Detail sections ── */
.detail-section {
    margin-bottom: 20px; border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
}
.detail-section .section-header {
    background: #161b22; padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
    border-bottom: 1px solid #30363d;
}
.detail-section .section-header:hover { background: #1c2333; }
.detail-section .section-header h3 { font-size: .85rem; font-weight: 600; color: #e1e4e8; flex: 1; }
.detail-section .section-header .arrow { color: #8b949e; transition: transform .2s; font-size: .75rem; }
.detail-section .section-header .arrow.open { transform: rotate(90deg); }
.detail-section .section-header .fmt-badge {
    font-size: .7rem; padding: 2px 8px; border-radius: 4px;
    background: #21262d; color: #8b949e; font-weight: 500;
}
.detail-section .section-header .fmt-badge.json { background: #1b3d1f; color: #7ee787; }
.detail-section .section-header .fmt-badge.form { background: #2d1f1f; color: #f0a8a8; }
.detail-section .section-header .fmt-badge.error { background: #3d1f1f; color: #f87171; }
.detail-section .section-header .fmt-badge.stage { background: #1f2d3d; color: #79c0ff; }
.detail-section .section-body { background: #0d1117; }
.detail-section .section-body.collapsed { display: none; }

.data-grid { padding: 12px 16px; font-size: .82rem; }
.data-grid .row { display: flex; padding: 4px 0; border-bottom: 1px solid #1c2128; }
.data-grid .row:last-child { border-bottom: none; }
.data-grid .key {
    min-width: 180px; max-width: 240px; flex-shrink: 0;
    color: #8b949e; font-family: 'Courier New',monospace;
    font-size: .78rem; padding-right: 12px; word-break: break-all;
}
.data-grid .value {
    flex: 1; color: #e1e4e8; word-break: break-all;
    white-space: pre-wrap; font-family: 'Courier New',monospace;
    font-size: .78rem; line-height: 1.4;
}
.data-grid .value.null { color: #484f58; font-style: italic; }
.data-grid .value.str { color: #a5d6ff; }
.data-grid .value.num { color: #79c0ff; }
.data-grid .value.bool { color: #ffa657; }

.code-block {
    padding: 16px; font-family: 'Courier New','Consolas',monospace;
    font-size: .82rem; line-height: 1.5; overflow-x: auto;
    white-space: pre-wrap; word-break: break-word; color: #e1e4e8;
    max-height: 500px; overflow-y: auto;
}
.code-block .string { color: #a5d6ff; }
.code-block .number { color: #79c0ff; }
.code-block .boolean { color: #ffa657; }
.code-block .null { color: #8b949e; }
.code-block .key { color: #d2a8ff; }
.code-block .bracket { color: #8b949e; }

/* ── Stage details ── */
.stage-detail-item {
    padding: 8px 16px; border-bottom: 1px solid #1c2128;
    display: flex; align-items: center; gap: 10px;
    font-size: .8rem;
}
.stage-detail-item:last-child { border-bottom: none; }
.stage-detail-item .stage-status-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.stage-detail-item .stage-status-dot.passed { background: #3fb950; }
.stage-detail-item .stage-status-dot.failed { background: #f85149; }
.stage-detail-item .stage-status-dot.skipped { background: #8b949e; }
.stage-detail-item .stage-name { font-weight: 600; min-width: 160px; color: #e1e4e8; }
.stage-detail-item .stage-data { color: #8b949e; font-size: .75rem; flex: 1; }
.stage-detail-item .stage-dur { color: #8b949e; font-family: 'Courier New',monospace; font-size: .72rem; }

/* ── Data Flow Visualization ── */
.data-flow-section {
    margin-bottom: 20px;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
    background: #0d1117;
}
.data-flow-section .flow-header {
    background: #161b22;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #30363d;
    font-weight: 600;
    font-size: .85rem;
    color: #e1e4e8;
    cursor: pointer;
    user-select: none;
}
.data-flow-section .flow-header:hover { background: #1c2333; }
.data-flow-section .flow-header .arrow { color: #8b949e; transition: transform .2s; font-size: .75rem; }
.data-flow-section .flow-header .arrow.open { transform: rotate(90deg); }
.data-flow-body { padding: 8px 0; }
.data-flow-body.collapsed { display: none; }

.flow-step {
    padding: 8px 16px;
    border-bottom: 1px solid #1c2128;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: .78rem;
    position: relative;
}
.flow-step:last-child { border-bottom: none; }
.flow-step .flow-step-num {
    min-width: 26px; height: 26px;
    border-radius: 50%;
    background: #21262d;
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 700; color: #8b949e;
    flex-shrink: 0;
}
.flow-step .flow-step-num.passed { background: #1b3d1f; color: #7ee787; }
.flow-step .flow-step-num.failed { background: #3d1f1f; color: #f87171; }
.flow-step .flow-step-num.skipped { background: #1f2d3d; color: #8b949e; }
.flow-step .flow-step-info { flex: 1; min-width: 0; }
.flow-step .flow-step-name { font-weight: 600; color: #e1e4e8; margin-bottom: 2px; }
.flow-step .flow-step-io {
    display: flex; gap: 12px; margin-top: 4px; flex-wrap: wrap;
}
.flow-step .flow-io-label {
    font-size: .65rem; color: #484f58; text-transform: uppercase; letter-spacing: .5px;
}
.flow-step .flow-io-value {
    font-size: .72rem; color: #8b949e; font-family: 'Courier New',monospace;
    word-break: break-all; max-width: 300px; line-height: 1.3;
}
.flow-step .flow-io-value.highlight { color: #a5d6ff; }
.flow-step .flow-step-dur {
    font-size: .68rem; color: #484f58; font-family: 'Courier New',monospace;
    flex-shrink: 0; min-width: 55px; text-align: right;
}
.flow-arrow {
    text-align: center; color: #30363d; font-size: .9rem;
    padding: 2px 0;
}
.flow-arrow.active { color: #58a6ff; }

.stage-input-badge {
    display: inline-block; font-size: .6rem; padding: 1px 5px; border-radius: 3px;
    background: #1f2d3d; color: #79c0ff; margin-right: 4px;
}
.stage-output-badge {
    display: inline-block; font-size: .6rem; padding: 1px 5px; border-radius: 3px;
    background: #1b3d1f; color: #7ee787; margin-right: 4px;
}

/* ── Model / Token / Provider badges ── */
.model-badge {
    display: inline-block; font-size: .6rem; padding: 1px 5px; border-radius: 3px;
    background: #2d1f3d; color: #d2a8ff; margin-right: 4px; font-weight: 600;
}
.provider-badge {
    display: inline-block; font-size: .6rem; padding: 1px 5px; border-radius: 3px;
    background: #1f2d2d; color: #a5d6ff; margin-right: 4px;
}
.token-badge {
    display: inline-block; font-size: .6rem; padding: 1px 5px; border-radius: 3px;
    background: #21262d; color: #ffa657; margin-right: 4px; font-family: 'Courier New',monospace;
}
.token-badge.in { color: #79c0ff; }
.token-badge.out { color: #7ee787; }
.token-badge.total { color: #ffa657; }

/* ── LLM Usage Summary Section ── */
.llm-summary {
    margin-bottom: 20px;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
    background: #0d1117;
}
.llm-summary .llm-header {
    background: #161b22;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #30363d;
    font-weight: 600;
    font-size: .85rem;
    color: #e1e4e8;
    cursor: pointer;
    user-select: none;
}
.llm-summary .llm-header:hover { background: #1c2333; }
.llm-summary .llm-header .arrow { color: #8b949e; transition: transform .2s; font-size: .75rem; }
.llm-summary .llm-header .arrow.open { transform: rotate(90deg); }
.llm-summary .llm-body { padding: 12px 16px; }
.llm-summary .llm-body.collapsed { display: none; }

.llm-row {
    display: flex; align-items: center; gap: 10px; padding: 6px 0;
    border-bottom: 1px solid #1c2128; font-size: .78rem;
}
.llm-row:last-child { border-bottom: none; }
.llm-row .llm-stage { min-width: 140px; color: #e1e4e8; font-weight: 500; flex-shrink: 0; }
.llm-row .llm-model { color: #d2a8ff; font-size: .72rem; font-family: 'Courier New',monospace; flex: 1; }
.llm-row .llm-provider { color: #a5d6ff; font-size: .68rem; min-width: 70px; }
.llm-row .llm-tokens { color: #ffa657; font-size: .7rem; font-family: 'Courier New',monospace; min-width: 100px; text-align: right; }
.llm-row .llm-tokens .in { color: #79c0ff; }
.llm-row .llm-tokens .out { color: #7ee787; }

.llm-totals {
    margin-top: 10px; padding-top: 8px; border-top: 2px solid #30363d;
    display: flex; gap: 20px; flex-wrap: wrap; font-size: .8rem;
}
.llm-totals .total-item { display: flex; align-items: center; gap: 6px; }
.llm-totals .total-label { color: #8b949e; }
.llm-totals .total-value { color: #e1e4e8; font-weight: 600; font-family: 'Courier New',monospace; }

/* ── Tab Bar ── */
.tab-bar {
    background: #0d1117;
    border-bottom: 1px solid #30363d;
    display: flex; align-items: stretch;
    flex-shrink: 0; overflow-x: auto; min-height: 36px;
}
.tab-bar::-webkit-scrollbar { height: 4px; }
.tab-bar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
.tab-item {
    padding: 6px 12px; font-size: .75rem; color: #8b949e;
    border-right: 1px solid #21262d; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap; user-select: none;
    background: #0d1117; transition: background .15s;
    flex-shrink: 0; min-width: 0;
}
.tab-item:hover { background: #161b22; color: #e1e4e8; }
.tab-item.active { background: #161b22; color: #e1e4e8; border-bottom: 2px solid #58a6ff; }
.tab-item .tab-name { max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
.tab-item .tab-close {
    font-size: .85rem; color: #484f58; cursor: pointer; line-height: 1;
    padding: 0 2px; border-radius: 3px;
}
.tab-item .tab-close:hover { color: #f85149; background: #3d1f1f; }
.tab-item .tab-badge {
    font-size: .6rem; padding: 1px 5px; border-radius: 8px;
    background: #21262d; color: #8b949e;
}
.tab-item .tab-badge.live { background: #1b3d1f; color: #7ee787; }
.tab-item .tab-badge.imported { background: #2d1f3d; color: #d2a8ff; }
.tab-add {
    padding: 6px 14px; font-size: .85rem; color: #8b949e; cursor: pointer;
    display: flex; align-items: center; border-right: 1px solid #21262d;
    background: #0d1117; flex-shrink: 0;
}
.tab-add:hover { background: #161b22; color: #58a6ff; }
.tab-import {
    padding: 6px 12px; font-size: .75rem; color: #8b949e; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    background: #0d1117; flex-shrink: 0; margin-left: auto;
}
.tab-import:hover { color: #d2a8ff; }
.tab-rename-input {
    background: #0d1117; border: 1px solid #58a6ff; border-radius: 3px;
    color: #e1e4e8; font-size: .75rem; padding: 2px 6px; outline: none;
    max-width: 130px;
}

/* ── Export/Import Buttons ── */
.export-btn-group {
    display: flex; gap: 4px; margin-left: 8px;
}
.export-btn-group button {
    background: #1f2d3d; border: 1px solid #30363d; border-radius: 4px;
    padding: 3px 10px; color: #79c0ff; font-size: .7rem; cursor: pointer;
}
.export-btn-group button:hover { background: #30363d; }
.export-btn-group button.export-md { color: #d2a8ff; }
.export-btn-group button.export-csv { color: #7ee787; }
.export-btn-group button.export-txt { color: #ffa657; }
.file-input-hidden { display: none; }

@media (max-width: 800px) {
    .main { flex-direction: column; }
    .entry-list { width: 100%; min-width: 0; max-height: 35vh; border-right: none; border-bottom: 1px solid #30363d; }
    .detail-panel { max-height: 65vh; }
    .pipeline-stages { flex-wrap: wrap; }
}

/* ── Expert Thought Cards (inline in stage details) ── */
.expert-thought-card {
    margin: 8px 16px;
    border: 1px solid #30363d;
    border-radius: 6px;
    overflow: hidden;
    background: #161b22;
}
.expert-thought-card .thought-header {
    padding: 6px 12px;

</head>
<body>

<div class="header">
    <h1>🔬 Live Viewer — AI Voice & Records Pipeline</h1>
    <span class="connection-status" id="connStatus">connecting...</span>
    <span class="connection-status" id="pipeStatus" style="margin-left:4px">pipe: connecting...</span>
    <div class="stats">
        <span>requests: <strong id="entryCount">0</strong></span>
        <span>traces: <strong id="traceCount">0</strong></span>
        <span>last: <strong id="lastEntry">—</strong></span>
    </div>
</div>

<div class="toolbar">
    <input type="text" id="filterInput" placeholder="Filter by transcript, action, context..." oninput="renderList()">
    <label><input type="checkbox" id="autoScroll" checked> Auto-scroll</label>
    <button onclick="clearCurrentSession()">Clear</button>
    <div class="export-btn-group">
        <button class="export-md" onclick="exportSession('markdown')" title="Export as Markdown report">📝 .md</button>
        <button class="export-csv" onclick="exportSession('csv')" title="Export as CSV table">📊 .csv</button>
        <button class="export-txt" onclick="exportSession('txt')" title="Export as plain text">📄 .txt</button>
    </div>
    <input type="file" id="importFileInput" class="file-input-hidden" accept=".json" onchange="importSession(this)">
    <button onclick="document.getElementById('importFileInput').click()" title="Import a saved session file">📥 Import</button>
</div>

<!-- ── Tab Bar ── -->
<div class="tab-bar" id="tabBar">
    <div class="tab-item active" data-tab="default" onclick="switchTab('default')">
        <span class="tab-name">Main Session</span>
        <span class="tab-badge live">live</span>
        <span class="tab-close" onclick="event.stopPropagation();closeTab('default')" title="Close tab">✕</span>
    </div>
    <div class="tab-add" onclick="addNewTab()" title="New live tab">+</div>
    <div class="tab-import" onclick="document.getElementById('importFileInput').click()" title="Import saved session">📥 Import Session</div>
</div>

<div class="main">
    <div class="entry-list" id="entryList">
        <div class="empty-state"><div class="icon">&#9678;</div><div>Waiting for requests...</div></div>
    </div>
    <div class="detail-panel" id="detailPanel">
        <div class="detail-empty">
            <div style="font-size:3rem">🔍</div>
            <div>Select a request to inspect</div>
            <div style="font-size:.75rem;color:#484f58">Shows AI pipeline stages, request/response data packages</div>
        </div>
    </div>
</div>

<script>
// ── Session-Based State ──
const sessions = [];
let activeSessionId = null;
let eventSource = null;
let pipelineSSE = null;
let tabCounter = 0;

function createSession(name, isLive, importedFrom) {
    const id = 'sess_' + Date.now() + '_' + (tabCounter++);
    const session = {
        id: id,
        name: name || ('Session ' + (sessions.length + 1)),
        entries: [],
        pipelineTraces: {},
        createdAt: new Date().toISOString(),
        isLive: !!isLive,
        importedFrom: importedFrom || null,
    };
    sessions.push(session);
    return session;
}

function getActiveSession() {
    if (!activeSessionId && sessions.length === 0) {
        createSession('Main Session', true);
        activeSessionId = sessions[0].id;
    }
    if (!activeSessionId && sessions.length > 0) {
        activeSessionId = sessions[0].id;
    }
    const s = sessions.find(s => s.id === activeSessionId);
    if (!s && sessions.length > 0) {
        activeSessionId = sessions[0].id;
        return sessions[0];
    }
    return s || null;
}

// ── Tab Management ──
function renderTabBar() {
    const bar = document.getElementById('tabBar');
    let html = '';
    sessions.forEach(s => {
        const isActive = s.id === activeSessionId;
        let badgeHTML = '';
        if (s.isLive) badgeHTML = '<span class="tab-badge live">live</span>';
        else if (s.importedFrom) badgeHTML = '<span class="tab-badge imported">imported</span>';
        html += '<div class="tab-item'+(isActive?' active':'')+'" data-tab="'+s.id+'" onclick="switchTab(\''+s.id+'\')" ondblclick="startRenameTab(\''+s.id+'\', this)" title="'+esc(s.name)+' (double-click to rename)">';
        html += '<span class="tab-name" id="tabName_'+s.id+'">'+esc(s.name)+'</span>';
        html += badgeHTML;
        if (sessions.length > 1) {
            html += '<span class="tab-close" onclick="event.stopPropagation();closeTab(\''+s.id+'\')" title="Close tab">✕</span>';
        }
        html += '</div>';
    });
    html += '<div class="tab-add" onclick="addNewTab()" title="New live tab">+</div>';
    html += '<div class="tab-import" onclick="document.getElementById(\'importFileInput\').click()" title="Import saved session">📥 Import Session</div>';
    bar.innerHTML = html;
}

function switchTab(sessionId) {
    if (activeSessionId === sessionId) return;
    // Save current filter/selection state (not needed, just switch)
    activeSessionId = sessionId;
    const s = getActiveSession();
    if (!s) return;
    renderTabBar();
    updateStats();
    renderList(false);
    // Clear detail panel
    document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><div style="font-size:3rem">🔍</div><div>Select a request to inspect</div><div style="font-size:.75rem;color:#484f58">Shows AI pipeline stages, request/response data packages</div></div>';
}

function addNewTab() {
    const s = createSession('Session ' + (sessions.length + 1), true);
    activeSessionId = s.id;
    renderTabBar();
    updateStats();
    renderList(false);
    document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><div style="font-size:3rem">🔍</div><div>New session started — waiting for requests...</div></div>';
}

function closeTab(sessionId) {
    if (sessions.length <= 1) return; // Keep at least one tab
    const idx = sessions.findIndex(s => s.id === sessionId);
    if (idx < 0) return;
    sessions.splice(idx, 1);
    if (activeSessionId === sessionId) {
        activeSessionId = sessions[Math.min(idx, sessions.length - 1)].id;
    }
    renderTabBar();
    updateStats();
    renderList(false);
    document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><div style="font-size:3rem">🔍</div><div>Select a request to inspect</div></div>';
}

function startRenameTab(sessionId, tabEl) {
    const s = sessions.find(s => s.id === sessionId);
    if (!s) return;
    const nameSpan = tabEl.querySelector('.tab-name');
    if (!nameSpan) return;
    const currentName = s.name;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'tab-rename-input';
    input.value = currentName;
    input.onblur = () => finishRename(sessionId, input.value, nameSpan);
    input.onkeydown = (e) => { if (e.key === 'Enter') finishRename(sessionId, input.value, nameSpan); if (e.key === 'Escape') finishRename(sessionId, currentName, nameSpan); };
    nameSpan.replaceWith(input);
    input.focus();
    input.select();
}

function finishRename(sessionId, newName, nameSpan) {
    const s = sessions.find(s => s.id === sessionId);
    if (s && newName.trim()) s.name = newName.trim();
    renderTabBar();
}

// ── SSE Connections ──
function connectSSE() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource(location.origin + '/api/live-viewer/stream');
    const cs = document.getElementById('connStatus');
    eventSource.onopen = () => { cs.textContent='connected'; cs.className='connection-status connected'; };
    eventSource.onmessage = e => {
        try {
            const entry = JSON.parse(e.data);
            // Push to ALL live sessions
            sessions.forEach(s => {
                if (!s.isLive) return;
                if (entry.pipeline_trace) {
                    s.pipelineTraces[entry.pipeline_trace.id || entry.id] = entry.pipeline_trace;
                }
                s.entries.push(entry);
            });
            updateStats();
            renderList(!!document.getElementById('autoScroll').checked);
        } catch(err) { console.error('SSE parse error:', err); }
    };
    eventSource.onerror = () => {
        cs.textContent='disconnected'; cs.className='connection-status disconnected';
        setTimeout(connectSSE, 3000);
    };
}

function connectPipelineSSE() {
    if (pipelineSSE) pipelineSSE.close();
    pipelineSSE = new EventSource(location.origin + '/api/live-viewer/pipeline/stream');
    const ps = document.getElementById('pipeStatus');
    pipelineSSE.onopen = () => { ps.textContent='pipe: live'; ps.className='connection-status connected'; };
    pipelineSSE.onmessage = e => {
        try {
            const event = JSON.parse(e.data);
            // Push to ALL live sessions
            sessions.forEach(s => {
                if (!s.isLive) return;
                if (event.type === 'pipeline_start' && event.trace) {
                    s.pipelineTraces[event.trace.id] = event.trace;
                } else if (event.type === 'pipeline_end' && event.trace) {
                    s.pipelineTraces[event.trace.id] = event.trace;
                    if (s.id === activeSessionId) {
                        document.getElementById('traceCount').textContent = Object.keys(s.pipelineTraces).length;
                        if (getSelectedId()) refreshDetail();
                    }
                } else if (event.type === 'pipeline_stage') {
                    const tid = event.request_id;
                    if (!s.pipelineTraces[tid]) {
                        s.pipelineTraces[tid] = { id: tid, stages: [], status: 'running', transcript: '', context_type: '' };
                    }
                    s.pipelineTraces[tid].stages.push(event.stage);
                    if (s.id === activeSessionId && getSelectedId()) refreshDetail();
                }
            });
        } catch(err) { console.error('Pipeline SSE error:', err); }
    };
    pipelineSSE.onerror = () => {
        ps.textContent='pipe: reconnecting'; ps.className='connection-status disconnected';
        setTimeout(connectPipelineSSE, 3000);
    };
}

function updateStats() {
    const s = getActiveSession();
    const eCount = s ? s.entries.length : 0;
    const tCount = s ? Object.keys(s.pipelineTraces).length : 0;
    document.getElementById('entryCount').textContent = eCount;
    document.getElementById('traceCount').textContent = tCount;
    if (s && s.entries.length > 0) document.getElementById('lastEntry').textContent = s.entries[s.entries.length-1].timestamp;
    else document.getElementById('lastEntry').textContent = '—';
}

// ── Session-scoped selected entry ID ──
function getSelectedId() {
    const s = getActiveSession();
    return s ? s._selectedId || null : null;
}
function setSelectedId(id) {
    const s = getActiveSession();
    if (s) s._selectedId = id;
}

// ── Rendering ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderList(scroll) {
    const container = document.getElementById('entryList');
    const s = getActiveSession();
    const entries = s ? s.entries : [];
    const pipelineTraces = s ? s.pipelineTraces : {};
    const filter = (document.getElementById('filterInput').value || '').toLowerCase();
    const filtered = filter
        ? entries.filter(e => {
            const sm = (e.summary||'').toLowerCase();
            const a = (e.action||'').toLowerCase();
            const ps = (e.pipeline_status||'').toLowerCase();
            const m = (e.mode||'').toLowerCase();
            const path = (e.path||'').toLowerCase();
            return sm.includes(filter) || String(e.status_code).includes(filter) || a.includes(filter) || ps.includes(filter) || m.includes(filter) || path.includes(filter);
        })
        : entries;
    if (filtered.length === 0) {
        container.innerHTML = entries.length === 0
            ? '<div class="empty-state"><div class="icon">&#9678;</div><div>Waiting for requests...</div></div>'
            : '<div class="empty-state"><div class="icon">&#9744;</div><div>No entries match filter</div></div>';
        return;
    }
    const selId = getSelectedId();
    let html = '';
    for (const entry of filtered) {
        const sc = entry.status_code < 300 ? 'ok' : (entry.status_code < 400 ? 'redirect' : 'err');
        const act = entry.id === selId ? ' active' : '';
        const st = entry.summary || '';
        const action = entry.action || '';
        const ps = entry.pipeline_status || '';
        const psClass = ps === 'completed' ? 'completed' : (ps === 'blocked' ? 'blocked' : (ps === 'error' ? 'error' : ''));
        const mode = entry.mode || '';
        const isRecords = mode === 'automate';

        let sh = esc(st)
            .replace(/\[([^\]]+)\]/g,'<span style="color:#d2a8ff">[$1]</span>')
            .replace(/\(audio\)/g,'<span style="color:#7ee787">(audio)</span>')
            .replace(/"([^"]+)"/g,'<span style="color:#a5d6ff">"$1"</span>');

        html += '<div class="entry-item'+act+'" data-id="'+entry.id+'" onclick="selectEntry(\''+entry.id+'\')">';
        html += '<div class="top-row">';
        html += '<span class="time">'+(entry.timestamp||'')+'</span>';
        html += '<span class="method">'+(entry.method||'POST')+'</span>';
        html += '<span class="status '+sc+'">'+entry.status_code+'</span>';
        if (isRecords) html += '<span class="action-tag" style="background:#1f2d3d;color:#79c0ff">records</span>';
        if (action) html += '<span class="action-tag">'+esc(action)+'</span>';
        html += '<span class="duration">'+entry.duration_ms+'ms</span>';
        html += '</div>';
        html += '<div class="summary-text">'+sh+'</div>';
        if (ps) html += '<span class="pipeline-badge '+psClass+'">pipeline: '+esc(ps)+'</span>';
        html += '</div>';
    }
    container.innerHTML = html;
    if (scroll) { container.scrollTop = container.scrollHeight; }
    else if (selId) { const el = container.querySelector('.active'); if (el) el.scrollIntoView({block:'nearest'}); }
}

function selectEntry(id) {
    setSelectedId(id);
    renderList(false);
    const s = getActiveSession();
    if (!s) return;
    const entry = s.entries.find(e => e.id === id);
    if (entry) renderDetail(entry);
}

function refreshDetail() {
    const selId = getSelectedId();
    if (!selId) return;
    const s = getActiveSession();
    if (!s) return;
    const entry = s.entries.find(e => e.id === selId);
    if (entry) renderDetail(entry);
}

function clearCurrentSession() {
    const s = getActiveSession();
    if (!s) return;
    s.entries.length = 0;
    for (const k in s.pipelineTraces) delete s.pipelineTraces[k];
    s._selectedId = null;
    document.getElementById('entryList').innerHTML = '<div class="empty-state"><div class="icon">&#9678;</div><div>Session cleared — waiting for requests...</div></div>';
    document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><div style="font-size:3rem">🔍</div><div>Select a request to inspect</div></div>';
    updateStats();
}

async function loadExisting() {
    // Only load into the first live session
    if (sessions.length === 0) createSession('Main Session', true);
    const s = sessions[0];
    activeSessionId = s.id;

    try {
        const resp = await fetch('/api/live-viewer/entries');
        const data = await resp.json();
        for (const summ of data) {
            const dr = await fetch('/api/live-viewer/entries/'+summ.id);
            if (dr.ok) {
                const full = await dr.json();
                if (!s.entries.find(e => e.id === full.id)) {
                    s.entries.push(full);
                    if (full.pipeline_trace) {
                        s.pipelineTraces[full.pipeline_trace.id || full.id] = full.pipeline_trace;
                    }
                }
            }
        }
        updateStats(); renderList(true);
    } catch(err) { console.error('loadExisting:', err); }

    try {
        const tr = await fetch('/api/live-viewer/pipeline/traces');
        const traces = await tr.json();
        for (const t of traces) {
            if (!s.pipelineTraces[t.id]) s.pipelineTraces[t.id] = t;
        }
        document.getElementById('traceCount').textContent = Object.keys(s.pipelineTraces).length;
    } catch(err) { console.error('loadTraces:', err); }

    renderTabBar();
}

// ═══════════════════════════════════════════════════════════════════════════
// Export (Markdown / CSV / TXT)
// ═══════════════════════════════════════════════════════════════════════════

function exportSession(format) {
    const s = getActiveSession();
    if (!s || s.entries.length === 0) { alert('No entries to export in current tab.'); return; }

    let content = '';
    let filename = '';
    let mime = '';

    if (format === 'markdown') {
        content = buildMarkdownExport(s);
        filename = (s.name||'session').replace(/[^a-zA-Z0-9_-]/g,'_') + '.md';
        mime = 'text/markdown';
    } else if (format === 'csv') {
        content = buildCSVExport(s);
        filename = (s.name||'session').replace(/[^a-zA-Z0-9_-]/g,'_') + '.csv';
        mime = 'text/csv';
    } else if (format === 'txt') {
        content = buildTXTExport(s);
        filename = (s.name||'session').replace(/[^a-zA-Z0-9_-]/g,'_') + '.txt';
        mime = 'text/plain';
    }

    const blob = new Blob(['\uFEFF' + content], { type: mime + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function buildMarkdownExport(s) {
    const now = new Date().toISOString().replace('T',' ').substring(0,19);
    let md = '# ' + (s.name||'Session') + '\n\n';
    md += '**Exported:** ' + now + '  \n';
    md += '**Entries:** ' + s.entries.length + '  \n';
    md += '**Pipeline Traces:** ' + Object.keys(s.pipelineTraces).length + '  \n';
    if (s.importedFrom) md += '**Imported from:** ' + s.importedFrom + '  \n';
    md += '\n---\n\n';

    // Summary table
    md += '## 📊 Request Summary\n\n';
    md += '| # | Time | Method | Status | Duration | Action | Mode | Pipeline | Summary |\n';
    md += '|---|------|--------|--------|----------|--------|------|----------|--------|\n';
    s.entries.forEach((e, i) => {
        md += '| ' + (i+1) + ' | ' + (e.timestamp||'') + ' | ' + (e.method||'POST') + ' | ' + e.status_code + ' | ' + (e.duration_ms||0) + 'ms | ' + (e.action||'') + ' | ' + (e.mode||'') + ' | ' + (e.pipeline_status||'') + ' | ' + ((e.summary||'').substring(0,80).replace(/\|/g,'\\|')) + ' |\n';
    });
    md += '\n---\n\n';

    // Pipeline traces
    md += '## 🔬 Pipeline Traces\n\n';
    const traceIds = Object.keys(s.pipelineTraces);
    if (traceIds.length === 0) {
        md += '*No pipeline traces recorded.*\n\n';
    } else {
        traceIds.forEach(tid => {
            const t = s.pipelineTraces[tid];
            md += '### Trace `' + tid.substring(0,12) + '...`\n\n';
            md += '- **Status:** ' + (t.status||'?') + '\n';
            md += '- **Context:** ' + (t.context_type||'?') + '\n';
            md += '- **Duration:** ' + (t.total_duration_ms||'?') + 'ms\n';
            md += '- **Transcript:** ' + ((t.transcript||'').substring(0,100)) + '\n\n';

            if (t.stages && t.stages.length > 0) {
                md += '| Stage | Status | Duration | Model | Tokens | Key Data |\n';
                md += '|-------|--------|----------|-------|--------|----------|\n';
                t.stages.forEach(st => {
                    const d = st.data || {};
                    const modelStr = d.model ? d.model.substring(0,40) : '';
                    const tokenStr = d.total_tokens ? (d.prompt_tokens||0)+'+'+(d.completion_tokens||0)+'='+d.total_tokens : '';
                    const keyData = [];
                    if (d.safe !== undefined) keyData.push('safe='+d.safe);
                    if (d.complexity) keyData.push(d.complexity);
                    if (d.risk) keyData.push('risk='+d.risk);
                    if (d.confidence !== undefined) keyData.push('conf='+Math.round(d.confidence*100)+'%');
                    if (d.action) keyData.push(d.action);
                    if (d.score !== undefined) keyData.push('score='+Math.round(d.score*100)+'%');
                    if (d.has_summary) keyData.push('summary=✓');
                    if (d.task_count) keyData.push('tasks='+d.task_count);
                    if (d.has_note) keyData.push('note=✓');
                    if (d.has_stack) keyData.push('stack=✓');
                    if (d.has_event) keyData.push('event=✓');
                    md += '| ' + (st.name||'') + ' | ' + (st.status||'') + ' | ' + (st.duration_ms||0) + 'ms | ' + modelStr + ' | ' + tokenStr + ' | ' + keyData.join(', ') + ' |\n';
                });
                md += '\n';
            }
        });
    }

    md += '\n---\n\n';
    md += '## 📥 Detailed Entries\n\n';
    s.entries.forEach((e, i) => {
        md += '### Entry ' + (i+1) + ': ' + (e.timestamp||'') + ' — ' + (e.method||'POST') + ' ' + e.status_code + '\n\n';
        md += '- **Summary:** ' + (e.summary||'') + '\n';
        md += '- **Action:** ' + (e.action||'none') + '\n';
        md += '- **Mode:** ' + (e.mode||'voice-command') + '\n';
        md += '- **Duration:** ' + (e.duration_ms||0) + 'ms\n';
        md += '- **Path:** `' + (e.path||'') + '`\n\n';
        if (e.request && e.request.form_fields && Object.keys(e.request.form_fields).length > 0) {
            md += '**Request Fields:**\n';
            Object.entries(e.request.form_fields).forEach(([k,v]) => {
                if (v && v !== 'None' && v !== 'null') md += '- `' + k + '`: ' + (String(v).substring(0,200)) + '\n';
            });
            md += '\n';
        }
        if (e.response && e.response.body) {
            md += '**Response Body:**\n```json\n' + JSON.stringify(e.response.body, null, 2).substring(0,2000) + '\n```\n\n';
        }
    });

    // LLM usage summary
    md += '\n---\n\n## 🤖 LLM Usage Summary\n\n';
    const allStages = [];
    Object.values(s.pipelineTraces).forEach(t => { if (t.stages) allStages.push(...t.stages); });
    const llmStages = allStages.filter(st => st.data && st.data.model);
    if (llmStages.length > 0) {
        let totalPrompt = 0, totalCompletion = 0, totalTokens = 0;
        const models = new Set();
        llmStages.forEach(st => {
            if (st.data.prompt_tokens) totalPrompt += st.data.prompt_tokens;
            if (st.data.completion_tokens) totalCompletion += st.data.completion_tokens;
            if (st.data.total_tokens) totalTokens += st.data.total_tokens;
            if (st.data.model) models.add(st.data.model);
        });
        md += '| Model | Provider | Calls | Prompt Tokens | Completion Tokens | Total Tokens |\n';
        md += '|-------|----------|-------|---------------|-------------------|-------------|\n';
        const modelMap = {};
        llmStages.forEach(st => {
            const key = st.data.model||'?';
            if (!modelMap[key]) modelMap[key] = { provider: st.data.provider||'?', calls: 0, prompt: 0, comp: 0, total: 0 };
            modelMap[key].calls++;
            modelMap[key].prompt += st.data.prompt_tokens||0;
            modelMap[key].comp += st.data.completion_tokens||0;
            modelMap[key].total += st.data.total_tokens||0;
        });
        Object.entries(modelMap).forEach(([model, info]) => {
            md += '| ' + model + ' | ' + info.provider + ' | ' + info.calls + ' | ' + info.prompt.toLocaleString() + ' | ' + info.comp.toLocaleString() + ' | ' + info.total.toLocaleString() + ' |\n';
        });
        md += '\n**Totals:** ' + totalPrompt.toLocaleString() + ' prompt + ' + totalCompletion.toLocaleString() + ' completion = **' + totalTokens.toLocaleString() + ' tokens**\n';
    } else {
        md += '*No LLM metadata captured.*\n';
    }

    return md;
}

function buildCSVExport(s) {
    // CSV of entries with pipeline data
    let csv = 'Index,Timestamp,Method,Path,StatusCode,DurationMs,Action,Mode,PipelineStatus,Summary,TranscriptPreview,HasTrace,LLMModels,TotalTokens\n';
    s.entries.forEach((e, i) => {
        const trace = e.pipeline_trace || s.pipelineTraces[e.id];
        const traceModels = [];
        let traceTokens = 0;
        if (trace && trace.stages) {
            trace.stages.forEach(st => {
                if (st.data && st.data.model && !traceModels.includes(st.data.model)) traceModels.push(st.data.model);
                if (st.data && st.data.total_tokens) traceTokens += st.data.total_tokens;
            });
        }
        const row = [
            i+1,
            '"'+(e.timestamp||'').replace(/"/g,'""')+'"',
            '"'+(e.method||'POST')+'"',
            '"'+(e.path||'').replace(/"/g,'""')+'"',
            e.status_code,
            e.duration_ms||0,
            '"'+(e.action||'').replace(/"/g,'""')+'"',
            '"'+(e.mode||'').replace(/"/g,'""')+'"',
            '"'+(e.pipeline_status||'').replace(/"/g,'""')+'"',
            '"'+(e.summary||'').replace(/"/g,'""').substring(0,200)+'"',
            '"'+((e.request&&e.request.body&&e.request.body.transcript_preview)||'').replace(/"/g,'""').substring(0,200)+'"',
            trace ? 'Yes' : 'No',
            '"'+traceModels.join('; ')+'"',
            traceTokens
        ];
        csv += row.join(',') + '\n';
    });
    return csv;
}

function buildTXTExport(s) {
    let txt = '=== ' + (s.name||'Session') + ' ===\n';
    txt += 'Exported: ' + new Date().toISOString() + '\n';
    txt += 'Entries: ' + s.entries.length + ' | Traces: ' + Object.keys(s.pipelineTraces).length + '\n';
    txt += '='.repeat(60) + '\n\n';

    s.entries.forEach((e, i) => {
        txt += '--- Entry ' + (i+1) + ' ---\n';
        txt += 'Time: ' + (e.timestamp||'') + '\n';
        txt += 'Method: ' + (e.method||'POST') + ' | Status: ' + e.status_code + ' | Duration: ' + (e.duration_ms||0) + 'ms\n';
        txt += 'Action: ' + (e.action||'none') + ' | Mode: ' + (e.mode||'') + '\n';
        txt += 'Summary: ' + (e.summary||'') + '\n';
        txt += 'Pipeline: ' + (e.pipeline_status||'none') + '\n';

        const trace = e.pipeline_trace || s.pipelineTraces[e.id];
        if (trace && trace.stages) {
            txt += 'Pipeline Stages:\n';
            trace.stages.forEach(st => {
                const d = st.data || {};
                txt += '  [' + (st.status||'?') + '] ' + (st.name||'?') + ' (' + (st.duration_ms||0) + 'ms)';
                if (d.model) txt += ' | model=' + d.model;
                if (d.total_tokens) txt += ' | tokens=' + d.total_tokens;
                txt += '\n';
            });
        }
        txt += '\n';
    });

    return txt;
}

function importSession(fileInput) {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data._exportVersion || !data.entries) {
                alert('Invalid session file format. Expected exported JSON session file.');
                return;
            }
            // Create a new imported session tab
            const s = createSession(data.sessionName || file.name.replace(/\.json$/,''), false, file.name);
            s.entries = data.entries || [];
            s.pipelineTraces = data.pipelineTraces || {};
            s.createdAt = data.exportedAt || new Date().toISOString();
            activeSessionId = s.id;
            renderTabBar();
            updateStats();
            renderList(false);
            document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><div style="font-size:3rem">📥</div><div>Imported ' + s.entries.length + ' entries from ' + esc(file.name) + '</div><div style="font-size:.75rem;color:#484f58">Select a request to inspect</div></div>';
        } catch(err) {
            alert('Failed to parse file: ' + err.message);
        }
    };
    reader.readAsText(file);
    fileInput.value = ''; // Reset so same file can be re-imported
}

// Also export a full JSON backup (for import) alongside other formats
function exportSessionJSON() {
    const s = getActiveSession();
    if (!s || s.entries.length === 0) { alert('No entries to export.'); return; }
    const data = {
        _exportVersion: 1,
        sessionName: s.name,
        exportedAt: new Date().toISOString(),
        entries: s.entries,
        pipelineTraces: s.pipelineTraces,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (s.name||'session').replace(/[^a-zA-Z0-9_-]/g,'_') + '.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// Attach JSON export to the export button group
function addJSONExportButton() {
    const group = document.querySelector('.export-btn-group');
    if (group && !document.getElementById('exportJsonBtn')) {
        const btn = document.createElement('button');
        btn.id = 'exportJsonBtn';
        btn.style.color = '#e1e4e8';
        btn.textContent = '💾 .json';
        btn.title = 'Export full session (for re-import)';
        btn.onclick = exportSessionJSON;
        group.appendChild(btn);
    }
}

function getStageStatus(stages, stageId) {
    if (!stages) return 'pending';
    const matches = stages.filter(s => s.name === stageId || s.name.startsWith(stageId));
    if (matches.length === 0) return 'pending';
    const hasFailed = matches.some(s => s.status === 'failed');
    const allPassed = matches.every(s => s.status === 'passed');
    if (hasFailed) return 'failed';
    if (allPassed) return 'passed';
    return 'running';
}

function getStageData(stages, stageId) {
    if (!stages) return {};
    const match = stages.find(s => s.name === stageId || s.name.startsWith(stageId));
    return match ? match.data : {};
}

function renderPipelineViz(trace, mode) {
    const isRecords = mode === 'automate';
    const flow = isRecords ? RECORDS_PIPELINE_FLOW : PIPELINE_FLOW;
    const title = isRecords ? '🤖 Records Automation Pipeline' : '🔬 AI Voice Pipeline';

    if (!trace || !trace.stages || trace.stages.length === 0) {
        return '<div class="pipeline-viz"><div class="viz-header">'+title+' <span class="viz-status" style="background:#21262d;color:#8b949e">No trace data</span></div><div class="pipeline-stages"><span style="color:#484f58;padding:12px">Pipeline trace not available — make a request to see pipeline execution</span></div></div>';
    }

    const stages = trace.stages;
    const traceStatus = trace.status || 'running';
    const statusClass = traceStatus === 'completed' ? 'completed' : (traceStatus === 'blocked' ? 'blocked' : (traceStatus === 'error' ? 'error' : 'running'));
    const ctx = trace.context_type ? ' ['+trace.context_type+']' : '';

    let vizHTML = '<div class="pipeline-viz">';
    vizHTML += '<div class="viz-header">'+title+' <span class="viz-status '+statusClass+'">' + traceStatus.toUpperCase() + '</span><span style="margin-left:auto;font-size:.7rem;color:#8b949e">'+(trace.total_duration_ms||'?')+'ms total</span></div>';
    vizHTML += '<div class="pipeline-stages">';

    for (let i = 0; i < flow.length; i++) {
        const node = flow[i];

        if (i > 0) {
            const prevNode = flow[i-1];
            const prevStatus = getStageStatus(stages, prevNode.id);
            vizHTML += '<div class="pipeline-connector'+(prevStatus==='passed'?' active':'')+'">→</div>';
        }

        if (node.isGroup) {
            const allPassed = node.children.every(c => getStageStatus(stages, c.id) === 'passed');
            const anyFailed = node.children.some(c => getStageStatus(stages, c.id) === 'failed');
            const anyRunning = node.children.some(c => getStageStatus(stages, c.id) === 'running');
            let groupStatus = 'pending';
            if (allPassed) groupStatus = 'passed';
            else if (anyFailed) groupStatus = 'failed';
            else if (anyRunning) groupStatus = 'running';

            vizHTML += '<div class="expert-group">';
            vizHTML += '<div class="group-label">Experts (parallel)</div>';
            vizHTML += '<div class="expert-row">';
            for (const child of node.children) {
                const cs = getStageStatus(stages, child.id);
                const cd = getStageData(stages, child.id);
                let tooltip = child.label.replace(/\\n/g,' ') + ': ' + cs;
                if (cd.risk) tooltip += ' | risk='+cd.risk;
                if (cd.confidence !== undefined) tooltip += ' | conf='+Math.round(cd.confidence*100)+'%';
                if (cd.language) tooltip += ' | lang='+cd.language;
                if (cd.has_summary) tooltip += ' | summary='+(cd.summary_preview||'').substring(0,40);
                if (cd.has_note) tooltip += ' | note='+(cd.note_title||'').substring(0,30);
                if (cd.task_count !== undefined) tooltip += ' | tasks='+cd.task_count;
                if (cd.has_stack) tooltip += ' | stack='+(cd.stack_name||'').substring(0,30);
                if (cd.has_event) tooltip += ' | event='+(cd.event_title||'').substring(0,30);
                if (cd.input_len) tooltip += ' | in='+cd.input_len+'c';
                if (cd.model) tooltip += ' | model='+cd.model;
                if (cd.total_tokens) tooltip += ' | '+cd.total_tokens+' tok';
                vizHTML += '<div class="pipeline-stage" title="'+esc(tooltip)+'" onclick="showExpertModal(\''+child.id+'\')">';
                vizHTML += '<div class="stage-dot '+cs+'">'+child.icon+'</div>';
                vizHTML += '<div class="stage-label'+(cs!=='pending'?' active':'')+'">'+esc(child.label)+'</div>';
                vizHTML += '</div>';
            }
            vizHTML += '</div></div>';
        } else {
            const ss = getStageStatus(stages, node.id);
            const sd = getStageData(stages, node.id);
            let tooltip = node.label.replace(/\\n/g,' ') + ': ' + ss;
            if (sd.safe !== undefined) tooltip += ' | safe='+sd.safe;
            if (sd.complexity) tooltip += ' | '+sd.complexity;
            if (sd.action) tooltip += ' | → '+sd.action;
            if (sd.score !== undefined) tooltip += ' | score='+Math.round(sd.score*100)+'%';
            if (sd.steps !== undefined) tooltip += ' | steps='+sd.steps;
            if (sd.transcript_len) tooltip += ' | transcript='+sd.transcript_len+'c';
            if (sd.summary_preview) tooltip += ' | summary='+(sd.summary_preview||'').substring(0,40);
            if (sd.task_count !== undefined) tooltip += ' | tasks='+sd.task_count;
            if (sd.has_note) tooltip += ' | note=✓';
            if (sd.has_stack) tooltip += ' | stack='+(sd.stack_name||'').substring(0,30);
            if (sd.has_calendar) tooltip += ' | cal='+(sd.has_calendar?'✓':'✗');
            if (sd.has_event) tooltip += ' | event='+(sd.event_title||'').substring(0,30);
            if (sd.experts_combined !== undefined) tooltip += ' | experts='+sd.experts_combined;
            if (sd.directive_len) tooltip += ' | directive='+sd.directive_len+'c';
            if (sd.model) tooltip += ' | model='+sd.model;
            if (sd.total_tokens) tooltip += ' | '+sd.total_tokens+' tok';
            if (sd.provider) tooltip += ' | via '+sd.provider;

            vizHTML += '<div class="pipeline-stage" title="'+esc(tooltip)+'" onclick="showExpertModal(\''+node.id+'\')">';
            vizHTML += '<div class="stage-dot '+ss+'">'+node.icon+'</div>';
            vizHTML += '<div class="stage-label'+(ss!=='pending'?' active':'')+'">'+esc(node.label)+'</div>';
            vizHTML += '</div>';
        }
    }

    vizHTML += '</div></div>';

    return vizHTML;
}

            if (data.findings_len) {

            dataPreview += '<span class="stage-output-badge">out</span>lang='+esc(data.language||'?')+' | tone='+esc(data.tone||'?');

            toolBadges = '<span class="tool-badge used">Lang Detection</span><span class="tool-badge used">Tone Classifier</span><span class="tool-badge used">Ambiguity Check</span>';
            if (data.plan_aware) toolBadges += '<span class="tool-badge used">Plan-intent Align</span>';
            toolBadges += '<span class="tool-badge used">LLM Intent</span>';
            // Show full intent
            if (data.intent) {
                expertCards += '<div class="expert-thought-card"><div class="thought-header">💬 Extracted Intent</div><div class="thought-body">'+esc(data.intent)+'</div></div>';

            expertCards += '<div class="expert-thought-card"><div class="thought-header">🔗 Synthesizer — Expert Fusion</div><div class="thought-body">Combined outputs from '+data.experts_combined+' experts'+(data.has_plan?' + execution plan':'')+' into a resolver directive.</div></div>';

            if (data.error) {

            }

            dataPreview += '<span class="stage-output-badge">out</span>score=<b>'+Math.round((data.score||0)*100)+'%</b>';

            }
            if (data.accepted) {
                expertCards += '<div class="expert-thought-card"><div class="thought-header" style="color:#7ee787">✅ Accepted</div><div class="thought-body">Reason: '+esc(data.reason||'')+'</div></div>';
            }
        } else {
            // Generic fallback
            if (data && Object.keys(data).length > 0) {
                const entries = Object.entries(data).slice(0, 4);
                dataPreview = entries.map(([k,v]) => k+': '+String(v).substring(0,60)).join(' | ');
            }
        }

        // ── Build stage detail item ──
        html += '<div class="stage-detail-item" style="flex-wrap:wrap;align-items:flex-start;padding:10px 16px">';
        html += '<div class="stage-status-dot '+stClass+'"></div>';
        html += '<span class="stage-name">'+esc(name)+'</span>';
        html += '<span class="stage-data" style="flex:1;min-width:200px">'+dataPreview+'</span>';
        // Model/token badges
        if (data.model) html += '<span class="model-badge" title="Model">'+esc(data.model)+'</span>';
        if (data.provider) html += '<span class="provider-badge" title="Provider">'+esc(data.provider)+'</span>';
        if (data.total_tokens) html += '<span class="token-badge total" title="Prompt: '+(data.prompt_tokens||0)+' | Completion: '+(data.completion_tokens||0)+'">'+(data.total_tokens||0)+' tok</span>';
        html += '<span class="stage-dur">'+(stage.duration_ms||0)+'ms</span>';
        html += '</div>';

        // Tool badges row
        if (toolBadges) {
            html += '<div style="padding:2px 16px 4px 46px;font-size:.65rem">'+toolBadges+'</div>';
        }

        // Expert thought cards
        if (expertCards) {
            html += expertCards;
        }

        // Reflection → Resolver loop indicator
        if (name === 'reflection' && data.needs_refinement && i+1 < stages.length && stages[i+1].name.startsWith('resolver')) {
            html += '<div style="text-align:center;padding:4px;color:#d2a8ff;font-size:.7rem">🪞 → 🎯 <span class="refine-loop-badge">Refinement Loop — Resolver retries with reflection feedback</span></div>';
        }

        i++;
    }

    html += '</div>';
    return html;
}

// ── Detail Rendering ──
function fv(v) {
    if (v === null || v === undefined) return '<span class="value null">null</span>';
    if (typeof v === 'boolean') return '<span class="value bool">'+v+'</span>';
    if (typeof v === 'number') return '<span class="value num">'+v+'</span>';
    if (typeof v === 'object') return '<span class="value">'+hlJSON(v)+'</span>';
    const s = String(v);
    if (s.length > 1 && (s[0] === '{' || s[0] === '[')) {
        try { return '<span class="value">'+hlJSON(JSON.parse(s))+'</span>'; } catch(e) {}
    }
    if (s.length > 5000) return '<span class="value str">'+esc(s.substring(0,5000))+'… <em>(truncated)</em></span>';
    return '<span class="value str">'+esc(s)+'</span>';
}

function kvRows(obj) {
    if (!obj || typeof obj !== 'object') return '';
    return Object.entries(obj).map(([k,v]) => '<div class="row"><div class="key">'+esc(k)+'</div>'+fv(v)+'</div>').join('');
}

function hlJSON(obj, indent) {
    indent = indent || '';
    const nl = '\n'+indent;
    if (obj === null || obj === undefined) return '<span class="null">null</span>';
    if (typeof obj === 'string') return '<span class="string">"'+esc(obj)+'"</span>';
    if (typeof obj === 'number') return '<span class="number">'+obj+'</span>';
    if (typeof obj === 'boolean') return '<span class="boolean">'+obj+'</span>';
    if (Array.isArray(obj)) {
        if (obj.length === 0) return '<span class="bracket">[</span><span class="bracket">]</span>';
        return '<span class="bracket">[</span>'+nl+obj.map(i => indent+'  '+hlJSON(i, indent+'  ')).join(','+nl)+nl+'<span class="bracket">]</span>';
    }
    const keys = Object.keys(obj);
    if (keys.length === 0) return '<span class="bracket">{</span><span class="bracket">}</span>';
    return '<span class="bracket">{</span>'+nl+keys.map(k => indent+'  <span class="key">"'+esc(k)+'"</span>: '+hlJSON(obj[k], indent+'  ')).join(','+nl)+nl+indent+'<span class="bracket">}</span>';
}
